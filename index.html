<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naren | Personal Webpage</title>
    <meta
      name="description"
      content="A Kuldar-inspired personal one-pager for Naren with a visible grid, animated signature, scribble portrait, experiments rail, and project cards."
    />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("naren-theme");
          const theme = storedTheme === "dark" || storedTheme === "light" ? storedTheme : "light";
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" aria-live="polite"></main>
    <noscript>
      <div class="noscript-shell">
        <h1>JavaScript is required to view this page.</h1>
        <p>
          This one-pager renders from a content module and powers the intro,
          signature, scratch portrait, research previews, and project motion in the browser.
        </p>
      </div>
    </noscript>
    <script src="./assets/signature-reveal-paths.js"></script>
    <script type="module" src="./script.js"></script>
  </body>
</html>
